<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Mansi 🐾</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap');

        :root {
            --bg: #fff0f3;
            --envelope: #ff85a1;
            --flap: #ff4d6d;
            --letter: #ffffff;
            --accent: #c9184a;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
        }

        /* Particles for the 'Explosion' */
        .particle {
            position: absolute;
            pointer-events: none;
            z-index: 100;
            font-size: 20px;
        }

        /* Envelope Wrapper */
        .wrapper {
            position: relative;
            z-index: 10;
            width: 300px;
            height: 200px;
            perspective: 1000px;
            transition: transform 0.3s;
        }

        .envelope {
            position: relative;
            width: 100%;
            height: 100%;
            background: var(--envelope);
            border-radius: 0 0 10px 10px;
            box-shadow: 0 15px 45px rgba(201, 24, 74, 0.3);
        }

        /* The Lid */
        .flap {
            position: absolute;
            top: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 110px solid var(--flap);
            transform-origin: top;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 5;
        }

        /* The Hidden Letter */
        .letter {
            position: absolute;
            bottom: 5px;
            left: 5%;
            width: 90%;
            height: 0%; /* Hidden initially */
            background: var(--letter);
            border-radius: 8px;
            padding: 25px 15px;
            text-align: center;
            transition: all 0.8s 0.4s ease-in-out;
            z-index: 2;
            opacity: 0; /* Fully hidden */
            overflow: hidden;
        }

        .letter h2 {
            font-family: 'Dancing Script', cursive;
            color: var(--accent);
            margin: 0;
            font-size: 28px;
            border-bottom: 1px dashed #ffccd5;
            padding-bottom: 10px;
        }

        .letter p {
            font-size: 16px;
            color: #444;
            line-height: 1.8;
            margin-top: 15px;
        }

        /* Animation when 'open' class is added */
        body.open .flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        body.open .letter {
            transform: translateY(-150px);
            height: auto;
            min-height: 220px;
            z-index: 10;
            opacity: 1;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* Floating Hint */
        .hint {
            position: fixed;
            bottom: 50px;
            color: var(--accent);
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 12px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        body.open .hint { display: none; }

    </style>
</head>
<body onclick="handleInteraction(event)">

    <div class="hint">Tap to open for Mansi 🐾</div>

    <div class="wrapper" id="mainWrapper">
        <div class="envelope">
            <div class="flap"></div>
            <div class="letter">
                <h2>Sorry Mansi</h2>
                <p>It's just a small joke, <br> tula rag alaa tar sorry, <br> parat nahi bolnar. ✨</p>
                <div style="margin-top: 10px;">💖🐾✨</div>
            </div>
        </div>
    </div>

    <script>
        let isOpen = false;

        function handleInteraction(e) {
            if (isOpen) return;
            
            isOpen = true;
            document.body.classList.add('open');
            
            // Create the 'Explosion' effect
            createExplosion(e.clientX, e.clientY);
        }

        function createExplosion(x, y) {
            const icons = ['💖', '🐾', '✨', '🐱', '🌸'];
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.innerHTML = icons[Math.floor(Math.random() * icons.length)];
                document.body.appendChild(p);

                const destinationX = (Math.random() - 0.5) * 300;
                const destinationY = (Math.random() - 0.5) * 300;
                const rotation = Math.random() * 520;

                const animation = p.animate([
                    { transform: 'translate(-50%, -50%) translate(' + x + 'px, ' + y + 'px) scale(1)', opacity: 1 },
                    { transform: 'translate(-50%, -50%) translate(' + (x + destinationX) + 'px, ' + (y + destinationY) + 'px) scale(0) rotate(' + rotation + 'deg)', opacity: 0 }
                ], {
                    duration: 1000 + Math.random() * 1000,
                    easing: 'cubic-bezier(0, .9, .57, 1)',
                    delay: Math.random() * 100
                });

                animation.onfinish = () => p.remove();
            }
        }
    </script>
</body>
</html>
